<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ravencoin Node</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --rvn-orange: #f7931a;
    --rvn-orange-dim: rgba(247, 147, 26, 0.6);
    --rvn-orange-glow: rgba(247, 147, 26, 0.15);
    --rvn-orange-subtle: rgba(247, 147, 26, 0.08);
    --rvn-dark: #0a0a0a;
    --rvn-surface: #111111;
    --rvn-surface-2: #1a1a1a;
    --rvn-text: #e0e0e0;
    --rvn-text-dim: #666666;
    --rvn-text-muted: #444444;
    --panel-width: 480px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--rvn-dark);
    color: var(--rvn-text);
    font-family: 'Inter', -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Animated background particles ── */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ── Main layout ── */
  .main-wrapper {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .main-wrapper.panel-open {
    transform: translateX(calc(var(--panel-width) / -2));
  }

  /* ── Block height hero ── */
  .block-height-section {
    text-align: center;
    margin-bottom: 64px;
  }

  .block-label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--rvn-orange);
    margin-bottom: 16px;
    opacity: 0.9;
  }

  .block-height {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(72px, 12vw, 160px);
    font-weight: 700;
    color: #ffffff;
    line-height: 1;
    text-shadow:
      0 0 40px var(--rvn-orange-glow),
      0 0 80px rgba(247, 147, 26, 0.08);
    animation: float 6s ease-in-out infinite;
    position: relative;
  }

  .block-height .digit {
    display: inline-block;
    transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    position: relative;
  }

  .block-height .digit.changing {
    animation: digitFlip 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    color: var(--rvn-orange);
    text-shadow: 0 0 30px var(--rvn-orange-dim);
  }

  .block-height .comma {
    color: var(--rvn-text-muted);
    font-weight: 400;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  @keyframes digitFlip {
    0% { transform: translateY(0); opacity: 1; }
    30% { transform: translateY(-20px); opacity: 0; }
    31% { transform: translateY(20px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }

  /* ── Time since block ── */
  .time-since {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    color: var(--rvn-text-dim);
    margin-top: 20px;
    letter-spacing: 1px;
  }

  .time-since .value {
    color: var(--rvn-orange-dim);
  }

  /* ── Stats grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1px;
    max-width: 800px;
    width: 90%;
    background: rgba(247, 147, 26, 0.06);
    border: 1px solid rgba(247, 147, 26, 0.08);
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.4),
      0 0 48px var(--rvn-orange-subtle),
      inset 0 1px 0 rgba(247, 147, 26, 0.06);
  }

  .stat-card {
    background: var(--rvn-surface);
    padding: 24px;
    text-align: center;
    transition: background 0.3s ease;
  }

  .stat-card:hover {
    background: var(--rvn-surface-2);
  }

  .stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--rvn-text-muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 500;
    color: var(--rvn-text);
  }

  .stat-value.hash {
    font-size: 11px;
    color: var(--rvn-text-dim);
    word-break: break-all;
    line-height: 1.5;
  }

  .stat-value.accent {
    color: var(--rvn-orange);
  }

  /* ── Version bar at bottom ── */
  .version-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--rvn-text-muted);
    letter-spacing: 1px;
    z-index: 2;
  }

  .version-bar .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--rvn-orange);
    margin-right: 8px;
    box-shadow: 0 0 8px var(--rvn-orange-dim);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Panel toggle button ── */
  .panel-toggle {
    position: fixed;
    top: 50%;
    right: 0;
    transform: translateY(-50%);
    z-index: 100;
    width: 32px;
    height: 80px;
    background: var(--rvn-surface);
    border: 1px solid rgba(247, 147, 26, 0.1);
    border-right: none;
    border-radius: 8px 0 0 8px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    box-shadow: -4px 0 16px rgba(0, 0, 0, 0.3);
  }

  .panel-toggle:hover {
    background: var(--rvn-surface-2);
    width: 36px;
    box-shadow: -4px 0 24px rgba(247, 147, 26, 0.1);
  }

  .panel-toggle svg {
    width: 14px;
    height: 14px;
    fill: var(--rvn-orange-dim);
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .panel-toggle.open svg {
    transform: rotate(180deg);
  }

  /* ── Side panel ── */
  .side-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: var(--panel-width);
    height: 100vh;
    background: var(--rvn-surface);
    border-left: 1px solid rgba(247, 147, 26, 0.08);
    z-index: 50;
    transform: translateX(100%);
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
    display: flex;
    flex-direction: column;
    box-shadow: -8px 0 32px rgba(0, 0, 0, 0.5);
  }

  .side-panel.open {
    transform: translateX(0);
  }

  .panel-tabs {
    display: flex;
    border-bottom: 1px solid rgba(247, 147, 26, 0.08);
    flex-shrink: 0;
  }

  .panel-tab {
    flex: 1;
    padding: 16px;
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--rvn-text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.3s ease;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: inherit;
  }

  .panel-tab:hover {
    color: var(--rvn-text-dim);
  }

  .panel-tab.active {
    color: var(--rvn-orange);
    border-bottom-color: var(--rvn-orange);
  }

  .panel-log {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    line-height: 1.7;
    color: var(--rvn-text-dim);
    white-space: pre-wrap;
    word-break: break-all;
    display: none;
  }

  .panel-log.active {
    display: block;
  }

  .panel-log::-webkit-scrollbar {
    width: 4px;
  }

  .panel-log::-webkit-scrollbar-track {
    background: transparent;
  }

  .panel-log::-webkit-scrollbar-thumb {
    background: rgba(247, 147, 26, 0.2);
    border-radius: 2px;
  }

  /* ── Loading state ── */
  .loading {
    text-align: center;
  }

  .loading-text {
    font-size: 14px;
    color: var(--rvn-text-muted);
    letter-spacing: 2px;
    animation: pulse 2s ease-in-out infinite;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
      width: 95%;
    }

    .side-panel {
      width: 100%;
      --panel-width: 100%;
    }

    .main-wrapper.panel-open {
      transform: translateX(0);
      opacity: 0.3;
      pointer-events: none;
    }

    .stat-card { padding: 16px; }
    .stat-value { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- Background particle canvas -->
<canvas id="bg-canvas"></canvas>

<!-- Main content -->
<div class="main-wrapper" id="main">
  <div class="block-height-section">
    <div class="block-label">Block Height</div>
    <div class="block-height" id="blockHeight">
      <span class="loading-text">Connecting</span>
    </div>
    <div class="time-since" id="timeSince"></div>
  </div>

  <div class="stats-grid" id="statsGrid" style="display:none;">
    <div class="stat-card">
      <div class="stat-label">Peers</div>
      <div class="stat-value accent" id="statPeers">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Score</div>
      <div class="stat-value accent" id="statScore">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Version</div>
      <div class="stat-value" id="statVersion">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Endpoint</div>
      <div class="stat-value" id="statAddress">--</div>
    </div>
    <div class="stat-card" style="grid-column: 1 / -1;">
      <div class="stat-label">Block Hash</div>
      <div class="stat-value hash" id="statHash">--</div>
    </div>
  </div>
</div>

<!-- Version bar -->
<div class="version-bar">
  <div><span class="dot"></span><span id="versionLabel">Ravencoin Node</span></div>
  <div id="lastUpdate"></div>
</div>

<!-- Side panel toggle -->
<button class="panel-toggle" id="panelToggle" aria-label="Toggle log panel">
  <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
</button>

<!-- Side panel -->
<div class="side-panel" id="sidePanel">
  <div class="panel-tabs">
    <button class="panel-tab active" data-tab="core">Raven Core</button>
    <button class="panel-tab" data-tab="electrumx">ElectrumX</button>
  </div>
  <div class="panel-log active" id="log-core"></div>
  <div class="panel-log" id="log-electrumx"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
(function() {
  'use strict';

  // ── Elements ──
  const blockHeightEl = document.getElementById('blockHeight');
  const timeSinceEl = document.getElementById('timeSince');
  const statsGrid = document.getElementById('statsGrid');
  const panelToggle = document.getElementById('panelToggle');
  const sidePanel = document.getElementById('sidePanel');
  const mainWrapper = document.getElementById('main');

  let currentHeight = null;
  let panelOpen = false;
  let subscribedCore = false;
  let subscribedElectrumx = false;

  // ── Socket ──
  const socket = io();

  socket.on('node_status', (data) => {
    if (data.blockHeight) {
      updateBlockHeight(data.blockHeight);
    }
    if (data.timeSinceBlock) {
      timeSinceEl.innerHTML = 'Last block <span class="value">' + escapeHtml(data.timeSinceBlock) + '</span> ago';
    }
    if (data.peers !== undefined) {
      statsGrid.style.display = '';
      document.getElementById('statPeers').textContent = data.peers;
    }
    if (data.score !== undefined) {
      document.getElementById('statScore').textContent = data.score;
    }
    if (data.version) {
      // Parse "Ravencoin:4.6.1(addr)" into clean display
      const v = data.version;
      const match = v.match(/^([^(]+)\(([^)]+)\)/);
      if (match) {
        document.getElementById('statVersion').textContent = match[1].trim();
        document.getElementById('statAddress').textContent = truncateAddr(match[2]);
        document.getElementById('statAddress').title = match[2];
      } else {
        document.getElementById('statVersion').textContent = v;
      }
      document.getElementById('versionLabel').textContent = data.version.split('(')[0].trim();
    }
    if (data.blockHash) {
      document.getElementById('statHash').textContent = data.blockHash;
    }
    if (data.ipPort) {
      const parts = data.ipPort.split('/');
      if (parts.length === 2) {
        document.getElementById('statAddress').textContent = parts[0] + ':' + parts[1];
        document.getElementById('statAddress').title = data.ipPort;
      }
    }
    if (data.updatedAt) {
      document.getElementById('lastUpdate').textContent = new Date(data.updatedAt).toLocaleTimeString();
    }
  });

  // ── Block height with digit animation ──
  function updateBlockHeight(newHeight) {
    const formatted = formatNumber(newHeight);
    const oldFormatted = currentHeight ? formatNumber(currentHeight) : '';

    let html = '';
    for (let i = 0; i < formatted.length; i++) {
      const ch = formatted[i];
      if (ch === ',') {
        html += '<span class="comma">,</span>';
      } else {
        const changed = oldFormatted[i] !== ch;
        html += '<span class="digit' + (changed && currentHeight ? ' changing' : '') + '">' + ch + '</span>';
      }
    }

    blockHeightEl.innerHTML = html;
    currentHeight = newHeight;

    // Remove animation class after it plays
    setTimeout(() => {
      document.querySelectorAll('.digit.changing').forEach(el => el.classList.remove('changing'));
    }, 700);
  }

  function formatNumber(n) {
    return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  }

  function truncateAddr(addr) {
    if (addr.length <= 16) return addr;
    return addr.slice(0, 8) + '...' + addr.slice(-6);
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ── Panel ──
  panelToggle.addEventListener('click', () => {
    panelOpen = !panelOpen;
    sidePanel.classList.toggle('open', panelOpen);
    panelToggle.classList.toggle('open', panelOpen);
    mainWrapper.classList.toggle('panel-open', panelOpen);

    if (panelOpen && !subscribedCore) {
      subscribedCore = true;
      socket.emit('subscribe_logs', 'core');
    }
  });

  // ── Panel tabs ──
  document.querySelectorAll('.panel-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.panel-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel-log').forEach(l => l.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.tab;
      document.getElementById('log-' + target).classList.add('active');

      // Subscribe to logs on first tab open
      if (target === 'electrumx' && !subscribedElectrumx) {
        subscribedElectrumx = true;
        socket.emit('subscribe_logs', 'electrumx');
      }
      if (target === 'core' && !subscribedCore) {
        subscribedCore = true;
        socket.emit('subscribe_logs', 'core');
      }
    });
  });

  // ── Streaming logs ──
  socket.on('log_core', (text) => appendLog('log-core', text));
  socket.on('log_electrumx', (text) => appendLog('log-electrumx', text));

  function appendLog(id, text) {
    const el = document.getElementById(id);
    const wasAtBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 30;
    el.textContent += text;
    // Trim if too long
    if (el.textContent.length > 200000) {
      el.textContent = el.textContent.slice(-100000);
    }
    if (wasAtBottom) el.scrollTop = el.scrollHeight;
  }

  // ── Background particles ──
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  const PARTICLE_COUNT = 60;

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = (Math.random() - 0.5) * 0.3;
      this.size = Math.random() * 1.5 + 0.5;
      this.opacity = Math.random() * 0.15 + 0.03;
      this.isOrange = Math.random() < 0.3;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
      if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = this.isOrange
        ? 'rgba(247, 147, 26, ' + this.opacity + ')'
        : 'rgba(255, 255, 255, ' + this.opacity * 0.5 + ')';
      ctx.fill();
    }
  }

  for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

  function drawConnections() {
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 150) {
          const opacity = (1 - dist / 150) * 0.04;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = (particles[i].isOrange || particles[j].isOrange)
            ? 'rgba(247, 147, 26, ' + opacity + ')'
            : 'rgba(255, 255, 255, ' + opacity * 0.5 + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => { p.update(); p.draw(); });
    drawConnections();
    requestAnimationFrame(animate);
  }
  animate();

})();
</script>
</body>
</html>
